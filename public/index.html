<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartImage Pro - 智能图片批量处理工具</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🖼️ SmartImage Pro</h1>
    <p class="subtitle">智能图片批量处理工具 — 拖拽上传，一键处理</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📁</div>
    <p>拖拽图片到此处，或点击选择文件</p>
    <p class="upload-hint">支持 JPG、PNG、WebP 格式，最多50张</p>
    <input type="file" id="fileInput" multiple accept="image/*" hidden>
  </div>

  <div class="controls" id="controls" style="display:none">
    <div class="control-group">
      <label>处理类型</label>
      <select id="actionSelect">
        <option value="compress">压缩图片</option>
        <option value="resize">调整尺寸 (缩放)</option>
        <option value="format">格式转换</option>
        <option value="grayscale">转为灰度</option>
      </select>
    </div>

    <div class="control-group" id="valueGroup">
      <label id="valueLabel">缩放宽度 (像素)</label>
      <input type="number" id="valueInput" value="1920" min="1">
    </div>

    <div class="control-group" id="qualityGroup">
      <label>压缩质量: <span id="qualityDisplay">80</span>%</label>
      <input type="range" id="qualityInput" min="10" max="100" value="80">
    </div>

    <button id="processBtn" class="btn-primary">🚀 开始处理</button>
  </div>

  <div class="file-list" id="fileList"></div>
  <div class="progress" id="progress" style="display:none">
    <div class="progress-bar" id="progressBar"></div>
    <span id="progressText">0%</span>
  </div>
  <div class="results" id="results"></div>

  <div class="support-section" style="margin-top:30px;padding:20px;background:#f8f9ff;border-radius:12px;text-align:center;">
    <p style="font-size:14px;color:#888;">💙 如果这个工具帮到了你，请考虑赞助支持持续开发</p>
    <p style="font-size:20px;margin:10px 0;">
      <a href="https://github.com/luczhan-open/SmartImage-Pro" style="text-decoration:none;color:#667eea;font-weight:600;">⭐ GitHub</a>
      <span style="margin:0 12px;color:#ddd;">|</span>
      <span style="color:#333;">PayPal: bangbangfxxk@outlook.com</span>
    </p>
    <p style="font-size:12px;color:#aaa;">仅需 $5，支持独立开发者 🙏</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
